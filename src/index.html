<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<header>
    <div class="py-5 px-3 flex flex-col  md:flex-row  md:justify-between md:items-center lg:mx-auto 2xl:w-7xl">

            <div class="mb-3 font-bold text-4xl text-(--logo-color) md:mb-0">
                FURNITURE
            </div>
            <nav>
                <ul class="flex flex-row justify-between items-center md:w-100">
                    <li class=" group flex flex-row items-center cursor-pointer transition-all duration-500">
                        <div class="w-8 h-8 mr-2 flex justify-center items-center  border border-solid rounded-full border-(--menu-circle-color) bg-(--menu-bg-color) group-hover:bg-blue-600 group-hover:outline-0">
                            <svg class="group-hover:hidden" width="20" height="20" viewBox="0 0 20 20" fill="none"
                                 xmlns="http://www.w3.org/2000/svg">
                                <path d="M16.6666 5L7.49998 14.1667L3.33331 10" stroke="#415BE7" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span class="hidden number group-hover:block">1</span>
                        </div>
                        <a href="#" class="font-regular text-base text-black">Cart</a>
                    </li>
                    <li>
                        <div class=" flex items-center w-2 h-[1px] border border-solid border-(--menu-circle-color) md:w-12"></div>
                    </li>
                    <li class="group flex flex-row items-center cursor-pointer"
                        id="review-circle transition-all duration-500">
                        <div class="w-8 h-8 mr-2 flex justify-center items-center  border border-solid rounded-full border-(--menu-circle-color) bg-(--menu-bg-color) group-hover:bg-blue-600 group-hover:outline-0">
                            <svg class="group-hover:hidden" width="20" height="20" viewBox="0 0 20 20" fill="none"
                                 xmlns="http://www.w3.org/2000/svg">
                                <path d="M16.6666 5L7.49998 14.1667L3.33331 10" stroke="#415BE7" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span class="hidden number group-hover:block">2</span>
                        </div>
                        <a href="#" class="font-regular text-base text-black">Review</a>
                    </li>
                    <li>
                        <div class=" flex items-center w-2 h-[1px] border border-solid border-(--menu-circle-color) md:w-12"></div>
                    </li>
                    <li class="flex flex-row items-center cursor-pointer">
                        <div class="w-8 h-8 mr-2 flex justify-center items-center  border border-transparent rounded-full outline-0 bg-blue-600">
                            <span class="number">3</span>
                        </div>
                        <a href="#" class="font-regular text-base text-black">Checkout</a>
                    </li>
                </ul>
            </nav>
        </div>

</header>
<main class="pt-10 pb-16 bg-(--main-bg-color)">
    <div class=" px-3 flex flex-col lg:flex-row lg:justify-between lg:items-end  lg:mx-auto 2xl:w-7xl">
        <div class="flex flex-col 2xl:ml-20">
            <h1 class="font-bold text-[32px] text-black ">Checkout</h1>
            <h2 class="my-7 font-bold text-xl text-black leading-0">Shipping information</h2>
            <form action="" class="w-full mb-10  grid grid-cols-3 gap-x-5 gap-y-6 md:w-2xl lg:w-lg xl:w-2xl lg:mb-0 ">
                <div class="col-span-3">
                    <label for="name"
                           class="relative inline-block mb-2 font-regular text-base text-black after:content-['_\00A0*'] after:text-red-500 after:absolute">Full
                        name</label>
                    <input type="text" id="name" name="name" placeholder="Enter full name"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
                <div class="col-span-3">
                    <label for="email"
                           class=" inline-block mb-2 font-regular text-base text-black after:content-['_\00A0*'] after:text-red-500 after:absolute">Email
                        address</label>
                    <input type="text" id="email" name="email" placeholder="Enter email address"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
                <div class="col-span-3">
                    <label for="phone"
                           class="inline-block mb-2 font-regular text-base text-black after:content-['_\00A0*'] after:text-red-500 after:absolute">Phone
                        number</label>
                    <input type="text" id="phone" name="phone" placeholder="Enter phone number"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
                <div class="col-span-3">
                    <label for="country"
                           class="inline-block mb-2 font-regular text-base text-black after:content-['_\00A0*'] after:text-red-500 after:absolute">Country</label>
                    <input type="text" id="country" name="country" placeholder="Enter your country"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
                <div class="col-span-3 md:col-span-1">
                    <label for="city" class="block mb-2 font-regular text-base text-black">City</label>
                    <input type="text" id="city" name="city" placeholder="Enter city"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
                <div class="col-span-3 md:col-span-1">
                    <label for="state" class="block mb-2 font-regular text-base text-black">State</label>
                    <input type="text" id="state" name="state" placeholder="Enter state"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
                <div class="col-span-3 md:col-span-1">
                    <label for="code" class="block mb-2 font-regular text-base text-black">ZIP code</label>
                    <input type="text" id="code" name="code" placeholder="Enter ZIP code"
                           class="w-full h-[51px] p-4 border solid rounded-lg border-(--menu-circle-color) outline-0 placeholder:text-base placeholder:text-[--input-text-color]">
                </div>
            </form>
        </div>
        <div class=" w-full flex flex-col md:w-[508px] lg:w-[528px] xl:w-xl">
            <h2 class="mb-6 text-xl text-black font-bold">Review your cart</h2>
            <article class="w-full h-full flex flex-row mb-6">
                <div class="w-25 h-25 mr-4">
                    <img src="./images/sofa.png" alt="Изображение дивана" class="w-full h-full">
                </div>
                <div class="h-25 flex flex-col justify-between">
                    <div>
                        <h3 class="mb-2 text-base text-black font-medium">DuoComfort Sofa Premium</h3>
                        <span class="text-sm text-neutral-500 font-regular leading-0">1x</span>
                    </div>
                    <div class="text-base text-black font-bold">$20.00</div>
                </div>
            </article>
            <article class="w-full h-full flex flex-row">
                <div class="w-25 h-25 mr-4">
                    <img src="./images/desk.png" alt="Изображение стола" class="w-full h-full">
                </div>
                <div class="h-25 flex flex-col justify-between">
                    <div>
                        <h3 class="mb-2 text-base text-black font-medium">IronOne Desk</h3>
                        <span class="text-sm text-neutral-500 font-regular leading-0">1x</span>
                    </div>
                    <div class="text-base text-black font-bold">$20.00</div>
                </div>
            </article>
            <div class="flex flex-col mt-10">
                <div class="flex flex-row justify-between">
                    <p class="text-sm text-(--price-color) font-regular">Subtotal</p>
                    <span class="text-sm text-black font-bold">$45.00</span>
                </div>
                <div class="my-4 flex flex-row justify-between">
                    <p class=" text-sm text-(--price-color) font-regular">Shipping</p>
                    <span class="text-sm text-black font-bold">$5</span>
                </div>
                <div class="mb-4 flex flex-row justify-between">
                    <p class="text-sm text-(--price-color) font-regular">Discount</p>
                    <span class="text-sm text-black font-bold">-$10</span>
                </div>
                <div class="mb-10 flex flex-row justify-between">
                    <p class="text-base text-(--price-color) font-bold">Total</p>
                    <span class="text-base text-black font-bold">$40.00</span>
                </div>
            </div>
            <button type="button"
                    class="w-full h-13 border border-solid rounded-lg p-2 outline-0 bg-blue-600 cursor-pointer text-base text-white font-bold transition-all duration-500 hover:bg-blue-800 hover:scale-98">
                Pay now
            </button>
        </div>
    </div>
</main>
<footer class="py-5 md:py-4">
    <div class="flex items-center justify-center text-xs text-neutral-500 font-medium">© 2025 Furniture, Inc. All
        Rights Reserved
    </div>
</footer>

</body>
</html>
